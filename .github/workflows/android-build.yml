name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci || npm install

      - name: Generate Native Android Code
        working-directory: ./frontend
        run: npx expo prebuild -p android --clean

      - name: Install required Android NDK
        run: |
          yes | sdkmanager --licenses > /dev/null
          for attempt in 1 2 3; do
            sdkmanager "ndk;27.1.12297006" && break
            if [ "$attempt" -eq 3 ]; then
              echo "Failed to install required NDK after 3 attempts"
              exit 1
            fi
            echo "Retrying NDK install (attempt $((attempt + 1))/3)..."
            sleep 10
          done

      - name: Fix Gradle Memory
        working-directory: ./frontend
        run: echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m" >> android/gradle.properties

      - name: Build Android APK
        working-directory: ./frontend/android
        env:
          NODE_OPTIONS: --max_old_space_size=6144
        run: ./gradlew assembleRelease --stacktrace > build.log 2>&1

      - name: Upload Log if Failed
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-error-log
          path: frontend/android/build.log

      - name: Show Error Summary
        if: failure()
        working-directory: ./frontend/android
        run: tail -n 250 build.log

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: frontend/android/app/build/outputs/apk/release/app-release.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: app-release
          path: ./apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./apk/app-release.apk
          tag_name: "v${{ github.run_number }}"
          name: "Release v${{ github.run_number }}"
          body: "Automated APK build from GitHub Actions."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
